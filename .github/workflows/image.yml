name: Image

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

env:
  TAG: ${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}
  REPOSITORY: ghcr.io/${GITHUB_REPOSITORY}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Build Docker image
        run: task image:build

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push Docker image
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        run: |
          docker tag ${{ env.REPOSITORY }}:${{ env.TAG }} ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker tag ${{ env.REPOSITORY }}:${{ env.TAG }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:latest

