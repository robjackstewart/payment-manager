<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav [mode]="sidenavMode()" [opened]="sidenavOpened()" class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="app-icon">account_balance_wallet</mat-icon>
      <span class="app-title">Payment Manager</span>
    </div>
    <mat-divider />
    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/payment-sources" routerLinkActive="active-link">
        <mat-icon matListItemIcon>credit_card</mat-icon>
        <span matListItemTitle>Payment Sources</span>
      </a>
      <a mat-list-item routerLink="/payees" routerLinkActive="active-link">
        <mat-icon matListItemIcon>store</mat-icon>
        <span matListItemTitle>Payees</span>
      </a>
      <a mat-list-item routerLink="/payments" routerLinkActive="active-link">
        <mat-icon matListItemIcon>payments</mat-icon>
        <span matListItemTitle>Payments</span>
      </a>
      <a mat-list-item routerLink="/contacts" routerLinkActive="active-link">
        <mat-icon matListItemIcon>group</mat-icon>
        <span matListItemTitle>Contacts</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      @if (isMobile()) {
        <button mat-icon-button (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="toolbar-title">Payment Manager</span>
      <span class="spacer"></span>
    </mat-toolbar>
    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
