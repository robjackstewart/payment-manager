<div class="page-header">
  <h1>Users</h1>
  <button mat-raised-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon> New User
  </button>
</div>

@if (loading()) {
  <div class="loading-container">
    <mat-spinner />
  </div>
} @else {
  <mat-card>
    <table mat-table [dataSource]="users()" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">{{ user.name }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-header">Actions</th>
        <td mat-cell *matCellDef="let user" class="actions-cell">
          <button mat-icon-button color="primary" (click)="openEditDialog(user)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteUser(user)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    @if (users().length === 0) {
      <div class="empty-state">
        <mat-icon>people_outline</mat-icon>
        <p>No users yet. Create one to get started.</p>
      </div>
    }
  </mat-card>
}
