<h2 mat-dialog-title>{{ data?.paymentSource ? 'Edit Payment Source' : 'New Payment Source' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>User</mat-label>
      <mat-select formControlName="userId">
        @for (user of data.users; track user.id) {
          <mat-option [value]="user.id">{{ user.name }}</mat-option>
        }
      </mat-select>
      @if (form.controls.userId.hasError('required')) {
        <mat-error>User is required</mat-error>
      }
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter name" />
      @if (form.controls.name.hasError('required')) {
        <mat-error>Name is required</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">
    {{ data?.paymentSource ? 'Save' : 'Create' }}
  </button>
</mat-dialog-actions>
