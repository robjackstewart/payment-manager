<div class="page-header">
  <h1>Payment Sources</h1>
  <button mat-raised-button color="primary" (click)="openCreateDialog()" [disabled]="!userContext.selectedUser()">
    <mat-icon>add</mat-icon> New Payment Source
  </button>
</div>

@if (!userContext.selectedUser()) {
  <div class="no-user-state">
    <mat-icon>person_search</mat-icon>
    <p>Select a user from the sidebar to view payment sources.</p>
  </div>
} @else if (loading()) {
  <div class="loading-container">
    <mat-spinner />
  </div>
} @else {
  <mat-card>
    <table mat-table [dataSource]="paymentSources()" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let ps">{{ ps.name }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-header">Actions</th>
        <td mat-cell *matCellDef="let ps" class="actions-cell">
          <button mat-icon-button color="primary" (click)="openEditDialog(ps)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deletePaymentSource(ps)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    @if (paymentSources().length === 0) {
      <div class="empty-state">
        <mat-icon>credit_card_off</mat-icon>
        <p>No payment sources yet. Create one to get started.</p>
      </div>
    }
  </mat-card>
}
