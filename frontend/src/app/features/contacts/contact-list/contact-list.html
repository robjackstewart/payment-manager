<div class="page-header">
  <h1>Contacts</h1>
  <button mat-raised-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon> New Contact
  </button>
</div>

@if (loading()) {
  <div class="loading-container">
    <mat-spinner />
  </div>
} @else {
  <mat-card>
    <table mat-table [dataSource]="contacts()" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let c">{{ c.name }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-header">Actions</th>
        <td mat-cell *matCellDef="let c" class="actions-cell">
          <button mat-icon-button color="primary" (click)="openEditDialog(c)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteContact(c)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    @if (contacts().length === 0) {
      <div class="empty-state">
        <mat-icon>group</mat-icon>
        <p>No contacts yet. Add contacts to split bills with others.</p>
      </div>
    }
  </mat-card>
}
