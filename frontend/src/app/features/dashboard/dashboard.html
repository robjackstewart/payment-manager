<h1 class="dashboard-header">Dashboard</h1>

<div class="dashboard-grid">
  <mat-card class="stat-card" routerLink="/users">
    <mat-card-header>
      <mat-icon mat-card-avatar>people</mat-icon>
      <mat-card-title>Users</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (loading()) {
        <mat-spinner diameter="40" />
      } @else {
        <p class="stat-number">{{ userCount() }}</p>
      }
    </mat-card-content>
    <mat-card-actions>
      <button mat-button routerLink="/users" color="primary">VIEW ALL</button>
    </mat-card-actions>
  </mat-card>

  <mat-card class="stat-card" routerLink="/payment-sources">
    <mat-card-header>
      <mat-icon mat-card-avatar>credit_card</mat-icon>
      <mat-card-title>Payment Sources</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (loading()) {
        <mat-spinner diameter="40" />
      } @else {
        <p class="stat-number">{{ paymentSourceCount() }}</p>
      }
    </mat-card-content>
    <mat-card-actions>
      <button mat-button routerLink="/payment-sources" color="primary">VIEW ALL</button>
    </mat-card-actions>
  </mat-card>

  <mat-card class="stat-card" routerLink="/payees">
    <mat-card-header>
      <mat-icon mat-card-avatar>store</mat-icon>
      <mat-card-title>Payees</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (loading()) {
        <mat-spinner diameter="40" />
      } @else {
        <p class="stat-number">{{ payeeCount() }}</p>
      }
    </mat-card-content>
    <mat-card-actions>
      <button mat-button routerLink="/payees" color="primary">VIEW ALL</button>
    </mat-card-actions>
  </mat-card>

  <mat-card class="stat-card" routerLink="/payments">
    <mat-card-header>
      <mat-icon mat-card-avatar>payments</mat-icon>
      <mat-card-title>Payments</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (loading()) {
        <mat-spinner diameter="40" />
      } @else {
        <p class="stat-number">{{ paymentCount() }}</p>
      }
    </mat-card-content>
    <mat-card-actions>
      <button mat-button routerLink="/payments" color="primary">VIEW ALL</button>
    </mat-card-actions>
  </mat-card>
</div>
